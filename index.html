<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efe9;color:#2c2c2a;font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Top bar ── */
.topbar{background:white;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.title{font-weight:600;font-size:14px}
.topdate{font-size:11px;color:#aaa;margin-left:10px}
.topright{display:flex;align-items:center;gap:8px}
.status{font-size:11px;color:#aaa;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.sdot.ok{background:#1D9E75}.sdot.err{background:#E24B4A}.sdot.spin{background:#EF9F27;animation:p .8s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.btn{font-size:11px;padding:5px 11px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:transparent;color:#555;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .1s;white-space:nowrap}
.btn:hover{background:#f0efe9}.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:#2c2c2a;color:white;border-color:transparent}.btn-primary:hover{background:#444}
.btn-sm{font-size:10px;padding:3px 9px;border-radius:20px}

/* ── Layout ── */
.main{flex:1;display:grid;grid-template-columns:290px 1fr 220px;grid-template-rows:1fr auto;gap:8px;padding:8px;overflow:hidden;min-height:0}
.panel{background:white;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{padding:9px 12px 8px;border-bottom:0.5px solid rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pt{font-size:10px;font-weight:600;color:#999;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.pb{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,0.1) transparent;min-height:0}
.sec{font-size:10px;font-weight:600;color:#ccc;letter-spacing:.07em;text-transform:uppercase;padding:6px 6px 3px;margin-top:2px}

/* ── Tags ── */
.tag{display:inline-flex;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;white-space:nowrap}

.t-aaaah{background:#E1F5EE;color:#085041}.t-school{background:#FAEEDA;color:#633806}
.t-life{background:#F1EFE8;color:#5F5E5A}

/* ── Inbox ── */
.icard{background:white;border:0.5px solid rgba(0,0,0,0.09);border-left:2.5px solid #ddd;border-radius:10px;padding:8px 10px;margin-bottom:4px;transition:opacity .3s}
.icard.p-high{border-left-color:#E24B4A}.icard.p-mid{border-left-color:#EF9F27}.icard.p-low{border-left-color:#1D9E75}
.ir1{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.ifrom{font-size:11px;font-weight:600;color:#2c2c2a;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itime{font-size:10px;color:#ccc;white-space:nowrap}
.isubj{font-size:11px;color:#888;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ibox{font-size:11px;background:#f7f6f2;border-radius:7px;padding:5px 8px;line-height:1.5;margin-bottom:6px;color:#2c2c2a}
.ibox b{font-weight:600}
.ibts{display:flex;gap:5px;flex-wrap:wrap}
.ibt{font-size:10px;padding:3px 9px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.12);background:transparent;color:#777;cursor:pointer;font-family:inherit;transition:all .1s;display:flex;align-items:center;gap:3px}
.ibt:hover{background:#f0efe9;color:#2c2c2a}
.ibt-add{background:#2c2c2a;color:white;border-color:transparent}.ibt-add:hover{background:#444}
.ibt-done{background:#E1F5EE;color:#085041;border-color:#9FE1CB}

/* ── Todos ── */
.titem{display:flex;align-items:flex-start;gap:7px;padding:7px 8px;border:0.5px solid rgba(0,0,0,0.08);border-radius:9px;margin-bottom:3px;background:white}
.titem.done{opacity:.32}.titem.done .ttext{text-decoration:line-through}
.tck{width:15px;height:15px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tck:hover{border-color:#888}.tck.on{background:#1D9E75;border-color:#1D9E75}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.pd-h{background:#E24B4A}.pd-m{background:#EF9F27}.pd-l{background:#1D9E75}
.ttext{flex:1;font-size:11px;color:#2c2c2a;line-height:1.45}
.tmeta{display:flex;gap:5px;align-items:center;margin-top:3px;flex-wrap:wrap}
.ttime{font-size:10px;color:#bbb}
.tdel{font-size:12px;color:#ddd;cursor:pointer;padding:0 3px;margin-left:auto;display:none;line-height:1}
.titem:hover .tdel{display:block}.tdel:hover{color:#E24B4A}
.addborder{border-top:0.5px solid rgba(0,0,0,0.07);flex-shrink:0}
.addinput{width:100%;border:none;background:transparent;font-size:11px;color:#2c2c2a;outline:none;font-family:inherit;padding:7px 10px}
.addinput::placeholder{color:#ccc}

/* ── Calendar ── */
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:5px}
.wcol{display:flex;flex-direction:column;gap:2px}
.wdh{text-align:center;font-size:10px;color:#ccc;padding:2px 0;font-weight:500}
.wtoday .wdh{color:#2c2c2a;font-weight:600}
.wdate{text-align:center;font-size:10px;color:#ccc;padding:1px 0 3px}
.wtodaynum{display:flex;width:19px;height:19px;background:#2c2c2a;color:white;border-radius:50%;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin:0 auto 3px}
.cev{border-radius:3px;padding:2px 4px;font-size:9px;line-height:1.3;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ev-lsc{background:#E6F1FB;color:#0C447C}.ev-o1{background:#EEEDFE;color:#3C3489}
.ev-aaaah{background:#E1F5EE;color:#085041}.ev-school{background:#FAEEDA;color:#633806}
.ev-life{background:#F1EFE8;color:#5F5E5A}

/* ── Advice bar ── */
.advbar{grid-column:1/-1;background:white;border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.advlabel{font-size:10px;font-weight:600;color:#ccc;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.advchips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.1);color:#666;background:#f7f6f2;display:flex;align-items:center;gap:4px}
.chip.urg{border-color:#E24B4A;color:#791F1F;background:#FCEBEB}
.chip.warn{border-color:#EF9F27;color:#633806;background:#FAEEDA}

/* ── Setup modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:white;border-radius:14px;padding:28px;width:440px;max-width:92vw}
.modal h2{font-size:16px;font-weight:600;margin-bottom:8px}
.modal p{font-size:12px;color:#666;line-height:1.7;margin-bottom:16px}
.modal label{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px;margin-top:12px}
.modal input{width:100%;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:9px 12px;font-size:12px;font-family:inherit;outline:none}
.modal input:focus{border-color:#2c2c2a}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:30px;color:#bbb;font-size:11px;text-align:center;height:100%;min-height:80px}
.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,0.08);border-top-color:#378ADD;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:24px;text-align:center;color:#ccc;font-size:11px}
</style>

  <div class="modal">

    <input type="text" id="inp-sb-url" placeholder="https://xxx.supabase.co" value="https://gmlcbfiwhhkbvfgmllay.supabase.co">

</div>

<div class="topbar">

<div class="main">
  <div class="panel">
    <div class="ph">
      <span class="pt"><i class="ti ti-inbox" aria-hidden="true"></i> 收件箱</span>
      <span style="font-size:10px;color:#bbb" id="inboxCount"></span>

  <div class="advbar">
    <span class="advlabel"><i class="ti ti-bulb" aria-hidden="true"></i> 提醒</span>
    <div class="advchips" id="advChips"><div class="chip">刷新后显示今日提醒</div></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────
const CFG = {
  anthropic: () => localStorage.getItem('sec_anthropic') || '',
  sbUrl:     () => localStorage.getItem('sec_sb_url') || '',
  sbKey:     () => localStorage.getItem('sec_sb_key') || '',
};

// ── Setup ─────────────────────────────────────────────────
function saveSetup() {
  const a = document.getElementById('inp-anthropic').value.trim();
  const u = document.getElementById('inp-sb-url').value.trim();
  const k = document.getElementById('inp-sb-key').value.trim();
  if (!a || !u || !k) { alert('请填写全部三个 key'); return; }
  localStorage.setItem('sec_anthropic', a);
  localStorage.setItem('sec_sb_url', u);
  localStorage.setItem('sec_sb_key', k);
  document.getElementById('setupModal').style.display = 'none';
}
function openSetup() {
  document.getElementById('inp-anthropic').value = CFG.anthropic();
  document.getElementById('inp-sb-url').value = CFG.sbUrl();
  document.getElementById('inp-sb-key').value = CFG.sbKey();
  document.getElementById('setupModal').style.display = 'flex';
}
// Auto-hide if keys exist
if (CFG.anthropic() && CFG.sbUrl() && CFG.sbKey()) {
  document.getElementById('setupModal').style.display = 'none';
}

// ── Date ─────────────────────────────────────────────────
const today = new Date();
document.getElementById('topdate').textContent =
  today.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('todayLabel').textContent =
  today.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});

// ── Status ────────────────────────────────────────────────
function setStatus(msg, state='idle') {
  document.getElementById('stext').textContent = msg;
  document.getElementById('sdot').className = 'sdot'+(state==='ok'?' ok':state==='err'?' err':state==='loading'?' spin':'');
}

// ── Supabase helpers ──────────────────────────────────────
async function sbFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': CFG.sbKey(),
      'Authorization': 'Bearer ' + CFG.sbKey(),
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'resolution=merge-duplicates' : '',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(CFG.sbUrl() + '/rest/v1/' + path, opts);
  if (!res.ok) { const e = await res.text(); throw new Error('Supabase: ' + e); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function sbUpsert(table, rows) {
  if (!rows.length) return;
  await sbFetch(table + '?on_conflict=id', 'POST', rows);
}

async function sbGet(table, filter='') {
  return sbFetch(table + (filter ? '?' + filter : ''));
}

async function sbPatch(table, filter, data) {
  await sbFetch(table + '?' + filter, 'PATCH', data);
}

// ── Claude API ────────────────────────────────────────────
async function callClaude(system, user) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CFG.anthropic(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system,
      messages: [{ role:'user', content:user }]
    })
  });
  if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||res.status); }
  const data = await res.json();
  const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  const clean = text.replace(/```json|```/g,'').trim();
  try { return JSON.parse(clean); }
  catch { const m=clean.match(/[\[{][\s\S]*[\]}]/); if(m) return JSON.parse(m[0]); throw new Error('JSON parse failed: '+clean.slice(0,200)); }
}

// ── Main refresh ──────────────────────────────────────────
let emailsCache = [];
let calCache = [];

async function runRefresh() {
  if (!CFG.anthropic()) { openSetup(); return; }
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  try {
    setStatus('读取邮件数据...', 'loading');
    await loadEmailsFromDB();
    setStatus('读取日历...', 'loading');
    await loadCalendar();
    setStatus('AI 生成计划...', 'loading');
    await generatePlan();
    setStatus('完成 · ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}), 'ok');
  } catch(e) {
    setStatus('出错: ' + e.message, 'err');
    console.error(e);
  }
  btn.disabled = false;
}

// ── Load emails ───────────────────────────────────────────
// NOTE: In this local HTML version, email data comes from Claude.ai's Gmail connector.
// When you refresh in Claude.ai, Claude reads your Gmail and injects data here via
// the INJECT functions below. This file stores everything persistently in Supabase.

async function loadEmailsFromDB() {
  // Load emails from Supabase that are still pending
  const rows = await sbGet('emails', 'status=eq.pending&order=created_at.desc&limit=50');
  emailsCache = rows;
  renderInbox(rows);
  document.getElementById('inboxCount').textContent = rows.length + ' 封';
}

// Called by Claude.ai to inject fresh email data
window.INJECT_EMAILS = async function(emails) {
  if (!emails || !emails.length) return;
  // Upsert into Supabase (won't overwrite status of existing emails)
  const rows = emails.map(e => ({
    id: e.id,
    from_name: e.from,
    subject: e.subject,
    time_label: e.time,
    cat: e.cat,
    priority: e.priority,
    action: e.action,
    status: 'pending',
  }));
  await sbUpsert('emails', rows);
  await loadEmailsFromDB();
};

window.INJECT_CALENDAR = function(events) {
  calCache = events || [];
  renderCalendar(calCache);
};

window.INJECT_TODOS = async function(todos) {
  if (!todos || !todos.length) return;
  const rows = todos.map(t => ({
    id: t.id || 'ai_' + Date.now() + Math.random(),
    text: t.text,
    priority: t.priority,
    cat: t.cat,
    est: t.est || '',
    done: false,
    manual: false,
  }));
  // Only insert AI todos that don't exist yet
  for (const r of rows) {
    try { await sbUpsert('todos', [r]); } catch(e) { console.warn(e); }
  }
  await loadTodosFromDB();
};

// ── Calendar (simple render, no API needed) ───────────────
async function loadCalendar() {
  // Calendar is rendered from injected data or shows empty state
  renderCalendar(calCache);
}

// ── Generate plan ─────────────────────────────────────────
async function generatePlan() {
  const pending = emailsCache.filter(e=>e.status==='pending');
  if (!pending.length) { await loadTodosFromDB(); return; }

  const system = `You are Effy's personal secretary. Generate a prioritized todo list for today.

Effy's context:
- She forgets to reply even without an answer — remind her to send interim "received, will follow up" replies
- Partners who helped her need follow-up thanks  
- O1 visa application and AAAAH progress get squeezed by urgent tasks
- School/CPT assignments CANNOT be missed (risks losing immigration status)
- If she's been looped in on an email but has no action (e.g. someone else forwarded for info), action = "回复感谢，无需跟进"

Return ONLY a JSON array, no markdown:
[{"id":"unique_id","text":"specific actionable task in Chinese","priority":"high|mid|low","cat":"lsc|o1|aaaah|school|life","est":"15min"}]

High = must do today. Mid = try today. Low = if time permits. Max 10 tasks.`;

  const emailSummary = pending.slice(0,15)
    .map(e=>`[${e.cat}][${e.priority}] From:${e.from_name} | ${e.subject} | Action needed:${e.action}`).join('\n');
  const todayStr = today.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const todos = await callClaude(system,
    `Today: ${todayStr}\n\nPending emails:\n${emailSummary}\n\nGenerate today's todo list.`
  );

  if (Array.isArray(todos)) {
    await window.INJECT_TODOS(todos);
  }
}

// ── Todos ─────────────────────────────────────────────────
async function loadTodosFromDB() {
  const rows = await sbGet('todos', 'order=created_at.asc');
  renderTodos(rows);
}

async function toggleTodo(id, currentDone) {
  await sbPatch('todos', 'id=eq.' + encodeURIComponent(id), { done: !currentDone });
  await loadTodosFromDB();
}

async function deleteTodo(id) {
  await sbFetch('todos?id=eq.' + encodeURIComponent(id), 'DELETE');
  await loadTodosFromDB();
}

async function handleAddTask(e) {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim(); if (!val) return;
  const cat = val.includes('LSC')||val.includes('工作')?'lsc':val.includes('O1')||val.includes('律师')?'o1':val.includes('AAAAH')?'aaaah':val.includes('学校')||val.includes('课')||val.includes('作业')?'school':'life';
  const priority = val.includes('今日')||val.includes('必须')||val.includes('紧急')?'high':'mid';
  const row = {id:'manual_'+Date.now(), text:val, priority, cat, est:'', done:false, manual:true};
  await sbUpsert('todos', [row]);
  await loadTodosFromDB();
  e.target.value = '';
}

// ── Email actions ─────────────────────────────────────────
async function doneEmail(id) {
  await sbPatch('emails', 'id=eq.' + encodeURIComponent(id), { status: 'done' });
  const el = document.getElementById('ec_' + id);
  if (el) { el.style.opacity='0'; setTimeout(()=>{ el.remove(); updateInboxCount(); },300); }
}

async function snoozeEmail(id) {
  await sbPatch('emails', 'id=eq.' + encodeURIComponent(id), { status: 'snoozed' });
  const el = document.getElementById('ec_' + id);
  if (el) { el.style.opacity='0.4'; }
}

async function addFromEmail(emailJson) {
  const e = JSON.parse(decodeURIComponent(emailJson));
  const row = {
    id: 'todo_' + e.id,
    text: '回复 ' + e.from_name + ' — ' + e.subject,
    priority: e.priority === 'high' ? 'high' : 'mid',
    cat: e.cat, est: '15min', done: false, manual: true
  };
  await sbUpsert('todos', [row]);
  await doneEmail(e.id);
  await loadTodosFromDB();
}

function updateInboxCount() {
  const count = document.getElementById('inboxBody').querySelectorAll('.icard').length;
  document.getElementById('inboxCount').textContent = count + ' 封';
}

// ── Render inbox ──────────────────────────────────────────
const CATS = {lsc:'LSC',o1:'O1',aaaah:'AAAAH',school:'学校',life:'生活'};
function tag(cat){ return `<span class="tag t-${cat||'life'}">${CATS[cat]||cat}</span>`; }

function renderInbox(items) {
  if (!items || !items.length) {
    document.getElementById('inboxBody').innerHTML = '<div class="empty">没有待处理邮件 🎉<br><br>点"刷新数据"更新收件箱</div>';
    return;
  }
  const groups = {high:[],mid:[],low:[]};
  items.forEach(e => (groups[e.priority]||groups.mid).push(e));
  let html = '';
  [['high','🔴 高优先'],['mid','🟡 中优先'],['low','🟢 低优先']].forEach(([p,label])=>{
    if (!groups[p].length) return;
    html += `<div class="sec">${label}</div>`;
    groups[p].forEach(e => { html += renderEmailCard(e); });
  });
  document.getElementById('inboxBody').innerHTML = html;
  document.getElementById('inboxCount').textContent = items.length + ' 封';
}

function renderEmailCard(e) {
  const safeId = e.id.replace(/[^a-zA-Z0-9_-]/g,'_');
  const jsonStr = encodeURIComponent(JSON.stringify({
    id:e.id, from_name:e.from_name, subject:e.subject, priority:e.priority, cat:e.cat
  }));
  return `<div class="icard p-${e.priority}" id="ec_${safeId}">
    <div class="ir1">
      <span class="ifrom">${esc(e.from_name)}</span>
      ${tag(e.cat)}
      <span class="itime">${esc(e.time_label)}</span>
    </div>
    <div class="isubj">${esc(e.subject)}</div>
    <div class="ibox"><b>你需要做：</b>${esc(e.action)}</div>
    <div class="ibts">
      <button class="ibt ibt-add" onclick="addFromEmail('${jsonStr}')">
        <i class="ti ti-plus" style="font-size:10px" aria-hidden="true"></i> 加入待办
      </button>
      <button class="ibt" onclick="snoozeEmail('${e.id}')">
        <i class="ti ti-clock" style="font-size:10px" aria-hidden="true"></i> 稍后
      </button>
      <button class="ibt ibt-done" onclick="doneEmail('${e.id}')">
        <i class="ti ti-check" style="font-size:10px" aria-hidden="true"></i> 已完成
      </button>
    </div>
  </div>`;
}

// ── Render todos ──────────────────────────────────────────
function renderTodos(rows) {
  if (!rows || !rows.length) {
    document.getElementById('todoBody').innerHTML = '<div class="empty">暂无待办<br>刷新后自动生成，或在下方手动添加</div>';
    return;
  }
  const pending = rows.filter(t=>!t.done);
  const done = rows.filter(t=>t.done);
  const groups = {high:[],mid:[],low:[]};
  pending.forEach(t=>(groups[t.priority]||groups.mid).push(t));
  let html = '';
  [['high','⚡ 今日必做'],['mid','今日尽力完成'],['low','有时间再做']].forEach(([p,label])=>{
    if (!groups[p].length) return;
    html += `<div class="sec">${label}</div>`;
    groups[p].forEach(t=>{ html += renderTodoItem(t,false); });
  });
  if (done.length) {
    html += `<div class="sec" style="margin-top:6px">已完成</div>`;
    done.forEach(t=>{ html += renderTodoItem(t,true); });
  }
  document.getElementById('todoBody').innerHTML = html;
}

function renderTodoItem(t, done) {
  return `<div class="titem ${done?'done':''}">
    <div class="pdot pd-${(t.priority||'m')[0]}"></div>
    <div class="tck ${done?'on':''}" onclick="toggleTodo('${t.id}',${done})" aria-label="完成">
      ${done?'<i class="ti ti-check" style="font-size:9px;color:white" aria-hidden="true"></i>':''}
    </div>
    <div style="flex:1;min-width:0">
      <div class="ttext">${esc(t.text)}</div>
      <div class="tmeta">
        ${tag(t.cat)}
        ${t.est?`<span class="ttime"><i class="ti ti-clock" style="font-size:10px" aria-hidden="true"></i> ${esc(t.est)}</span>`:''}
      </div>
    </div>
    <span class="tdel" onclick="deleteTodo('${t.id}')" title="删除">×</span>
  </div>`;
}

// ── Render calendar ───────────────────────────────────────
function renderCalendar(events) {
  const monday = new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7));
  const days=['一','二','三','四','五','六','日'];
  let html = '<div class="wgrid">';
  for (let i=0;i<7;i++) {
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const isToday = d.toDateString()===today.toDateString();
    const ds = d.toISOString().split('T')[0];
    const dayEvs = (events||[]).filter(e=>e.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    html += `<div class="wcol ${isToday?'wtoday':''}">
      <div class="wdh">${days[i]}</div>
      <div>${isToday?`<div class="wtodaynum">${d.getDate()}</div>`:`<div class="wdate">${d.getDate()}</div>`}</div>
      ${dayEvs.map(ev=>`<div class="cev ev-${ev.cat||'life'}" title="${esc(ev.title)}">${ev.time?ev.time.slice(0,5)+' ':''}${esc(ev.title)}</div>`).join('')}
    </div>`;
  }
  html += '</div>';
  if (!events || !events.length) html += '<div style="font-size:10px;color:#ccc;padding:6px 8px;line-height:1.6">日历数据需要在 Claude 中刷新后显示</div>';
  document.getElementById('calBody').innerHTML = html;
}

// ── Advice ────────────────────────────────────────────────
function renderAdvice(emails, todos) {
  const chips = [];
  const highTodos = (todos||[]).filter(t=>t.priority==='high'&&!t.done);
  if (highTodos.length) chips.push({text:`今日必做 ${highTodos.length} 项`, cls:'urg'});
  const schoolEmails = (emails||[]).filter(e=>e.cat==='school'&&e.status==='pending');
  if (schoolEmails.length) chips.push({text:'学校通知未处理，CPT 相关请优先确认', cls:'urg'});
  const needsReply = (emails||[]).filter(e=>e.status==='pending');
  if (needsReply.length) chips.push({text:`${needsReply.length} 封邮件待处理`, cls:'warn'});
  chips.push({text:'回复完记得发感谢/进展更新', cls:''});
  chips.push({text:'晚上看一眼 Apple Calendar 私人安排', cls:''});
  document.getElementById('advChips').innerHTML = chips.map(c=>
    `<div class="chip ${c.cls}">${c.cls==='urg'?'<i class="ti ti-alert-triangle" style="font-size:11px" aria-hidden="true"></i> ':c.cls==='warn'?'<i class="ti ti-clock" style="font-size:10px" aria-hidden="true"></i> ':''}${esc(c.text)}</div>`
  ).join('');
}

// ── Utils ─────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init: load existing data from Supabase ────────────────
(async () => {
  if (!CFG.anthropic() || !CFG.sbUrl() || !CFG.sbKey()) return;
  try {
    setStatus('加载数据...', 'loading');
    const [emails, todos] = await Promise.all([
      sbGet('emails', 'status=eq.pending&order=created_at.desc&limit=50'),
      sbGet('todos', 'order=created_at.asc'),
    ]);
    emailsCache = emails;
    renderInbox(emails);
    renderTodos(todos);
    renderCalendar([]);
    renderAdvice(emails, todos);
    setStatus('数据已加载', 'ok');
  } catch(e) {
    setStatus('加载失败: ' + e.message, 'err');
    console.error(e);
  }
})();
</script>
