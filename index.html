<script>
// ── Config ────────────────────────────────────────────────
const CFG = {
  anthropic: () => localStorage.getItem('sec_anthropic') || '',
  sbUrl:     () => localStorage.getItem('sec_sb_url') || '',
  sbKey:     () => localStorage.getItem('sec_sb_key') || '',
};

function saveSetup() {
  const a=document.getElementById('inp-anthropic').value.trim();
  const u=document.getElementById('inp-sb-url').value.trim();
  const k=document.getElementById('inp-sb-key').value.trim();
  if(!a||!u||!k){alert('请填写全部三个 key');return;}
  localStorage.setItem('sec_anthropic',a);
  localStorage.setItem('sec_sb_url',u);
  localStorage.setItem('sec_sb_key',k);
  document.getElementById('setupModal').style.display='none';
  init();
}
function openSetup(){
  document.getElementById('inp-anthropic').value=CFG.anthropic();
  document.getElementById('inp-sb-url').value=CFG.sbUrl();
  document.getElementById('inp-sb-key').value=CFG.sbKey();
  document.getElementById('setupModal').style.display='flex';
}
if(CFG.anthropic()&&CFG.sbUrl()&&CFG.sbKey()) document.getElementById('setupModal').style.display='none';

// ── Date ──────────────────────────────────────────────────
const today=new Date();
document.getElementById('topdate').textContent=today.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('todayLabel').textContent=today.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});

// ── Status ────────────────────────────────────────────────
function setStatus(msg,state='idle'){
  document.getElementById('stext').textContent=msg;
  document.getElementById('sdot').className='sdot'+(state==='ok'?' ok':state==='err'?' err':state==='loading'?' spin':'');
}

// ── Supabase ──────────────────────────────────────────────
async function sbFetch(path,method='GET',body=null){
  const opts={method,headers:{'apikey':CFG.sbKey(),'Authorization':'Bearer '+CFG.sbKey(),'Content-Type':'application/json','Prefer':method==='POST'?'resolution=merge-duplicates':''}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(CFG.sbUrl()+'/rest/v1/'+path,opts);
  if(!res.ok){const e=await res.text();throw new Error('DB: '+e);}
  const t=await res.text();return t?JSON.parse(t):[];
}
async function sbUpsert(table,rows){if(!rows.length)return;await sbFetch(table+'?on_conflict=id','POST',rows);}
async function sbGet(table,filter=''){return sbFetch(table+(filter?'?'+filter:''));}
async function sbPatch(table,filter,data){await sbFetch(table+'?'+filter,'PATCH',data);}
async function sbDelete(table,filter){await sbFetch(table+'?'+filter,'DELETE');}

// ── Claude API ────────────────────────────────────────────
async function callClaude(system,user){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':CFG.anthropic(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system,messages:[{role:'user',content:user}]})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.status);}
  const data=await res.json();
  const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  const clean=text.replace(/```json|```/g,'').trim();
  try{return JSON.parse(clean);}catch{const m=clean.match(/[\[{][\s\S]*[\]}]/);if(m)return JSON.parse(m[0]);throw new Error('JSON parse failed');}
}

// ── State ─────────────────────────────────────────────────
let emailsCache=[];
let calCache=[];
let tlItems=[];  // timeline items: {id, type:'cal'|'todo', title, time, endTime, must, cat, done}
let textModeOpen=false;

// ── Init ──────────────────────────────────────────────────
async function init(){
  if(!CFG.sbKey())return;
  try{
    setStatus('加载数据...','loading');
    const [emails,todos,calRows]=await Promise.all([
      sbGet('emails','status=eq.pending&order=created_at.desc&limit=50'),
      sbGet('todos','done=eq.false&order=created_at.asc'),
      sbGet('settings','key=eq.cal_today'),
    ]);
    emailsCache=emails;
    renderInbox(emails);
    const calData=calRows.length?JSON.parse(calRows[0].value||'[]'):[];
    calCache=calData;
    buildTimeline(todos,calData);
    renderCalendar(calData);
    setStatus('就绪','ok');
  }catch(e){setStatus('加载失败: '+e.message,'err');console.error(e);}
}

// ── Refresh ───────────────────────────────────────────────
async function runRefresh(){
  if(!CFG.anthropic()){openSetup();return;}
  const btn=document.getElementById('refreshBtn');btn.disabled=true;
  try{
    setStatus('读取邮件...','loading');
    await loadEmailsFromDB();
    setStatus('完成 · '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),'ok');
  }catch(e){setStatus('出错: '+e.message,'err');console.error(e);}
  btn.disabled=false;
}

async function loadEmailsFromDB(){
  const rows=await sbGet('emails','status=eq.pending&order=created_at.desc&limit=50');
  emailsCache=rows;renderInbox(rows);
  document.getElementById('inboxCount').textContent=rows.length+' 封';
}

// ── Inject (called after import) ──────────────────────────
window.INJECT_EMAILS=async function(emails){
  if(!emails||!emails.length)return;
  const rows=emails.map(e=>({id:e.id,from_name:e.from,subject:e.subject,time_label:e.time,cat:e.cat,priority:e.priority,action:e.action,status:'pending'}));
  await sbUpsert('emails',rows);
  await loadEmailsFromDB();
};

window.INJECT_CALENDAR=async function(events){
  calCache=events||[];
  await sbUpsert('settings',[{key:'cal_today',value:JSON.stringify(calCache)}]);
  const todos=await sbGet('todos','done=eq.false&order=created_at.asc');
  buildTimeline(todos,calCache);
  renderCalendar(calCache);
};

// ── Import modal ──────────────────────────────────────────
function closeImport(){document.getElementById('importModal').style.display='none';}
async function runImport(){
  const raw=document.getElementById('importJson').value.trim();

  let data;try{data=JSON.parse(raw);}catch{alert('JSON 格式有误');return;}

// ── Confirm delete ────────────────────────────────────────
let pendingDeleteFn=null;
function showConfirm(fn){pendingDeleteFn=fn;document.getElementById('confirmModal').style.display='flex';}
function closeConfirm(){document.getElementById('confirmModal').style.display='none';pendingDeleteFn=null;}
document.getElementById('confirmDeleteBtn').onclick=async()=>{if(pendingDeleteFn)await pendingDeleteFn();closeConfirm();};

// ── Timeline builder ──────────────────────────────────────
function buildTimeline(todos,calEvents){
  const todayStr=today.toISOString().split('T')[0];
  const todayCal=(calEvents||[]).filter(e=>e.date===todayStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  tlItems=[];
  todayCal.forEach(e=>{
    tlItems.push({id:'cal_'+e.title,type:'cal',title:e.title,time:e.time,endTime:e.endTime||'',cat:e.cat,must:true,done:false});
  });
  (todos||[]).forEach(t=>{
    tlItems.push({id:t.id,type:'todo',title:t.text,time:t.scheduled_time||'',cat:t.cat,must:t.must||false,done:t.done||false,priority:t.priority});
  });
  renderTimeline();
}

function renderTimeline(){
  const container=document.getElementById('tlBody');
  if(!tlItems.length){container.innerHTML='<div class="empty">拖入任务或点文本编辑安排今日计划</div>';return;}

  const calItems=tlItems.filter(t=>t.type==='cal').sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const scheduled=tlItems.filter(t=>t.type==='todo'&&t.time).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const unscheduled=tlItems.filter(t=>t.type==='todo'&&!t.time);

  const nowStr=now();
  let html='<div class="tl">';

  // Merge cal + scheduled todos by time
  const all=[...calItems,...scheduled].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  let shownNow=false;

  all.forEach(item=>{
    if(!shownNow&&item.time&&item.time>nowStr){
      html+=nowMarker();shownNow=true;
    }
    html+=tlRow(item);
  });
  if(!shownNow){html+=nowMarker();}

  // Unscheduled todos
  if(unscheduled.length){
    html+=`<div style="font-size:10px;font-weight:600;color:#ccc;letter-spacing:.06em;text-transform:uppercase;padding:8px 6px 4px 58px">未排时间</div>`;
    unscheduled.forEach(item=>{html+=tlRow(item);});
  }

  html+='</div>';

  // Drop zone
  html+=`<div class="drop-zone" id="dropZone" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
    <i class="ti ti-arrows-move" style="font-size:14px;margin-right:6px" aria-hidden="true"></i> 从左边拖入任务
  </div>`;

  container.innerHTML=html;
}

function tlRow(item){
  const isCal=item.type==='cal';
  const isMust=item.must;
  const typeClass=isCal?'type-cal':isMust?'type-must':'type-todo';
  const timeLabel=item.time?(item.endTime?item.time+'–'+item.endTime:item.time):'';
  const catTag=item.cat?`<span class="tag t-${item.cat}" style="font-size:9px">${{lsc:'LSC',o1:'O1',aaaah:'AAAAH',school:'学校',life:'生活'}[item.cat]||item.cat}</span>`:'';

  let actions='';
  if(!isCal){
    actions=`<div class="tl-acts">
      <button class="tact tact-done" onclick="doneTodo('${item.id}')"><i class="ti ti-check" style="font-size:10px" aria-hidden="true"></i> 完成</button>
      ${!isMust?`<button class="tact tact-must" onclick="toggleMust('${item.id}')">⚡ 必须</button>`:`<button class="tact" onclick="toggleMust('${item.id}')">取消必须</button>`}
      <button class="tact" onclick="moveTomorrow('${item.id}')">明日</button>
      <button class="tact" onclick="moveToInbox('${item.id}')">放回 inbox</button>
      <button class="tact" style="color:#E24B4A" onclick="confirmDeleteTodo('${item.id}')"><i class="ti ti-trash" style="font-size:10px" aria-hidden="true"></i></button>
    </div>`;
  }

  return `<div class="tl-row ${typeClass}" id="tlr_${item.id}">
    <div class="tl-time">${timeLabel}</div>
    <div class="tl-spine"><div class="tl-dot"></div></div>
    <div class="tl-body">
      <div class="tl-title">${isMust?'⚡ ':''}${esc(item.title)}</div>
      ${timeLabel||item.cat?`<div class="tl-sub" style="display:flex;gap:4px;align-items:center">${catTag}</div>`:''}
      ${actions}
    </div>
  </div>`;
}

function nowMarker(){
  const t=now();
  return `<div class="now-marker">
    <div class="now-line-left">${t}</div>
    <div class="now-dot-el"></div>
    <div class="now-line-right"></div>
  </div>`;
}

function now(){return today.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false});}

// ── Timeline actions ──────────────────────────────────────
async function doneTodo(id){
  await sbPatch('todos','id=eq.'+encodeURIComponent(id),{done:true});
  tlItems=tlItems.filter(t=>t.id!==id);renderTimeline();
}

async function toggleMust(id){
  const item=tlItems.find(t=>t.id===id);if(!item)return;
  item.must=!item.must;
  await sbPatch('todos','id=eq.'+encodeURIComponent(id),{must:item.must});
  renderTimeline();
}

async function moveTomorrow(id){
  await sbPatch('todos','id=eq.'+encodeURIComponent(id),{scheduled_date:tomorrowStr()});
  tlItems=tlItems.filter(t=>t.id!==id);renderTimeline();
}

async function moveToInbox(id){
  const item=tlItems.find(t=>t.id===id);if(!item)return;
  // Convert todo back to email-style inbox item
  await sbPatch('emails','id=eq.'+encodeURIComponent(id),{status:'pending'});
  tlItems=tlItems.filter(t=>t.id!==id);renderTimeline();
  await loadEmailsFromDB();
}

function confirmDeleteTodo(id){
  showConfirm(async()=>{
    await sbDelete('todos','id=eq.'+encodeURIComponent(id));
    tlItems=tlItems.filter(t=>t.id!==id);renderTimeline();
  });
}

function tomorrowStr(){const d=new Date(today);d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}

// ── Quick add ─────────────────────────────────────────────
async function handleQuickAdd(e){
  if(e.key!=='Enter')return;
  const val=e.target.value.trim();if(!val)return;
  const cat=val.includes('LSC')?'lsc':val.includes('O1')||val.includes('律师')?'o1':val.includes('AAAAH')?'aaaah':val.includes('学校')||val.includes('作业')?'school':'life';
  const must=val.includes('⚡')||val.includes('必须')||val.includes('紧急');
  const id='manual_'+Date.now();
  const row={id,text:val.replace('⚡','').trim(),priority:must?'high':'mid',cat,done:false,manual:true,must,scheduled_date:today.toISOString().split('T')[0]};
  await sbUpsert('todos',[row]);
  tlItems.push({id,type:'todo',title:row.text,time:'',cat,must,done:false});
  renderTimeline();
  e.target.value='';
}

// ── Text mode ─────────────────────────────────────────────
function toggleTextMode(){
  textModeOpen=!textModeOpen;
  document.getElementById('textModePanel').style.display=textModeOpen?'flex':'none';
  document.getElementById('textModeBtn').innerHTML=textModeOpen?'<i class="ti ti-x"></i> 关闭':'<i class="ti ti-pencil"></i> 文本编辑';
  if(textModeOpen){
    // Generate text from current timeline
    const lines=[];
    tlItems.filter(t=>t.type==='cal').sort((a,b)=>(a.time||'').localeCompare(b.time||'')).forEach(t=>{
      lines.push(`${t.time}${t.endTime?'-'+t.endTime:''} ${t.title} [会议]`);
    });
    tlItems.filter(t=>t.type==='todo').forEach(t=>{
      lines.push(`- ${t.must?'⚡ ':''}${t.title}`);
    });
    document.getElementById('textArea').value=lines.join('\n');
  }
}

async function saveTextMode(){
  const text=document.getElementById('textArea').value;
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const newTodos=[];
  lines.forEach(line=>{
    if(line.startsWith('-')){
      const raw=line.replace(/^-\s*/,'');
      const must=raw.includes('⚡');
      const txt=raw.replace('⚡','').trim();
      const cat=txt.includes('LSC')?'lsc':txt.includes('AAAAH')?'aaaah':txt.includes('律师')||txt.includes('O1')?'o1':txt.includes('学校')?'school':'life';
      newTodos.push({id:'txt_'+Date.now()+'_'+Math.random().toString(36).slice(2),text:txt,priority:must?'high':'mid',cat,done:false,manual:true,must,scheduled_date:today.toISOString().split('T')[0]});
    }
  });
  // Clear today's manual todos and re-insert
  const existingIds=tlItems.filter(t=>t.type==='todo').map(t=>t.id);
  for(const id of existingIds){
    try{await sbDelete('todos','id=eq.'+encodeURIComponent(id));}catch(e){console.warn(e);}
  }
  if(newTodos.length)await sbUpsert('todos',newTodos);
  const todos=await sbGet('todos','done=eq.false&order=created_at.asc');
  buildTimeline(todos,calCache);
  toggleTextMode();
}

// ── Drag & drop from inbox ────────────────────────────────
let dragEmailId=null;
function startDrag(id){dragEmailId=id;}
function onDragOver(e){e.preventDefault();document.getElementById('dropZone').classList.add('over');}
function onDragLeave(){document.getElementById('dropZone').classList.remove('over');}
async function onDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('over');
  if(!dragEmailId)return;
  const email=emailsCache.find(em=>em.id===dragEmailId);if(!email)return;
  const id='todo_'+dragEmailId;
  const row={id,text:email.action||email.subject,priority:email.priority==='high'?'high':'mid',cat:email.cat,done:false,manual:true,must:email.priority==='high',scheduled_date:today.toISOString().split('T')[0]};
  await sbUpsert('todos',[row]);
  await sbPatch('emails','id=eq.'+encodeURIComponent(email.id),{status:'done'});
  emailsCache=emailsCache.filter(em=>em.id!==email.id);
  renderInbox(emailsCache);
  tlItems.push({id,type:'todo',title:row.text,time:'',cat:email.cat,must:row.must,done:false});
  renderTimeline();
  dragEmailId=null;
}

// ── Inbox ─────────────────────────────────────────────────
const CATS={lsc:'LSC',o1:'O1',aaaah:'AAAAH',school:'学校',life:'生活'};
function tag(cat){return `<span class="tag t-${cat||'life'}">${CATS[cat]||cat}</span>`;}

function renderInbox(items){
  if(!items||!items.length){document.getElementById('inboxBody').innerHTML='<div class="empty">没有待处理邮件 🎉<br><br>点"刷新数据"更新</div>';return;}
  // High priority first, then rest; snoozed at bottom
  const active=items.filter(e=>e.status==='pending');
  const groups={high:[],mid:[],low:[]};
  active.forEach(e=>(groups[e.priority]||groups.mid).push(e));
  let html='';
  [['high','⚡ 必须处理'],['mid','待处理'],['low','低优先']].forEach(([p,label])=>{
    if(!groups[p].length)return;
    html+=`<div class="sec">${label}</div>`;
    groups[p].forEach(e=>{html+=renderEmailCard(e);});
  });
  document.getElementById('inboxBody').innerHTML=html;
  document.getElementById('inboxCount').textContent=active.length+' 封';
}

function renderEmailCard(e){
  const sid=e.id.replace(/[^a-zA-Z0-9_-]/g,'_');
  const jstr=encodeURIComponent(JSON.stringify({id:e.id,from_name:e.from_name,subject:e.subject,priority:e.priority,cat:e.cat}));
  return `<div class="icard p-${e.priority}" id="ec_${sid}" draggable="true" ondragstart="startDrag('${e.id}')">
    <div class="ir1">
      <span class="ifrom">${esc(e.from_name)}</span>${tag(e.cat)}<span class="itime">${esc(e.time_label)}</span>
    </div>
    <div class="isubj">${esc(e.subject)}</div>
    <div class="ibox" onclick="editAction('${sid}','${e.id}')" title="点击编辑"><b>你需要做：</b><span id="act_${sid}">${esc(e.action)}</span></div>
    <div class="ibts">
      <button class="ibt ibt-add" onclick="addToTimeline('${jstr}')"><i class="ti ti-plus" style="font-size:10px" aria-hidden="true"></i> 加入今日</button>
      <button class="ibt" onclick="snoozeToBottom('${e.id}')"><i class="ti ti-arrow-down" style="font-size:10px" aria-hidden="true"></i> 稍后</button>
      <button class="ibt ibt-done" onclick="doneEmail('${e.id}')"><i class="ti ti-check" style="font-size:10px" aria-hidden="true"></i> 已完成</button>
    </div>
  </div>`;
}

function editAction(sid,emailId){
  const span=document.getElementById('act_'+sid);if(!span)return;
  const cur=span.textContent;
  const box=span.closest('.ibox');
  box.innerHTML=`<b>你需要做：</b><textarea class="ibox-edit" id="ed_${sid}">${cur}</textarea>`;
  const ta=document.getElementById('ed_'+sid);ta.focus();
  ta.onblur=async()=>{
    const newVal=ta.value.trim();
    await sbPatch('emails','id=eq.'+encodeURIComponent(emailId),{action:newVal});
    box.onclick=()=>editAction(sid,emailId);
    box.innerHTML=`<b>你需要做：</b><span id="act_${sid}">${esc(newVal)}</span>`;
  };
}

async function doneEmail(id){
  await sbPatch('emails','id=eq.'+encodeURIComponent(id),{status:'done'});
  emailsCache=emailsCache.filter(e=>e.id!==id);
  renderInbox(emailsCache);
}

async function snoozeToBottom(id){
  // Move to bottom by updating order — just re-render with snoozed at end
  const item=emailsCache.find(e=>e.id===id);if(!item)return;
  emailsCache=emailsCache.filter(e=>e.id!==id);
  emailsCache.push(item);
  renderInbox(emailsCache);
}

async function addToTimeline(jstr){
  const e=JSON.parse(decodeURIComponent(jstr));
  const id='todo_'+e.id;
  const must=e.priority==='high';
  const row={id,text:e.from_name+' — '+(e.subject||'').slice(0,50),priority:e.priority==='high'?'high':'mid',cat:e.cat,done:false,manual:true,must,scheduled_date:today.toISOString().split('T')[0]};
  await sbUpsert('todos',[row]);
  await doneEmail(e.id);
  tlItems.push({id,type:'todo',title:row.text,time:'',cat:e.cat,must,done:false});
  renderTimeline();
}

// ── Calendar ──────────────────────────────────────────────
function renderCalendar(events){
  const monday=new Date(today);monday.setDate(today.getDate()-((today.getDay()+6)%7));
  const days=['一','二','三','四','五','六','日'];
  let html='<div class="wgrid">';
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const isToday=d.toDateString()===today.toDateString();
    const ds=d.toISOString().split('T')[0];
    const dayEvs=(events||[]).filter(e=>e.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    html+=`<div class="wcol ${isToday?'wtoday':''}">
      <div class="wdh">${days[i]}</div>
      <div>${isToday?`<div class="wtodaynum">${d.getDate()}</div>`:`<div class="wdate">${d.getDate()}</div>`}</div>
      ${dayEvs.map(ev=>`<div class="cev ev-${ev.cat||'life'}" title="${esc(ev.title)}">${ev.time?ev.time.slice(0,5)+' ':''}${esc(ev.title)}</div>`).join('')}
    </div>`;
  }
  html+='</div>';
  if(!events||!events.length)html+='<div style="font-size:10px;color:#ccc;padding:6px 8px;line-height:1.6">连接 Google Calendar 后刷新显示</div>';
  document.getElementById('calBody').innerHTML=html;
}

// ── Utils ─────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Boot ──────────────────────────────────────────────────
renderCalendar([]);
if(CFG.sbKey())init();
</script>
